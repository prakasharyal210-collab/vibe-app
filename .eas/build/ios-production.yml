build:
  name: iOS Production build
  steps:
    - eas/checkout
    - run:
        name: Install dependencies
        command: pnpm install --no-frozen-lockfile
    - run:
        name: Prebuild
        command: cd artifacts/mobile && pnpm exec expo prebuild --no-install --platform ios
    - run:
        name: Configure EAS Update
        command: cd artifacts/mobile && pnpm exec expo-updates runtimeversion:resolve --platform ios || true
    - run:
        name: Link iOS project to workspace root
        command: ln -sf "$(pwd)/artifacts/mobile/ios" ios
    - eas/run_fastlane
    - eas/find_and_upload_build_artifacts
