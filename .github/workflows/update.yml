name: OTA Update

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Update message'
        required: true
        default: 'Bug fixes and improvements'

jobs:
  update:
    name: Publish OTA Update
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Publish OTA Update
        working-directory: artifacts/mobile
        run: eas update --branch production --message "${{ github.event.inputs.message }}" --non-interactive
        env:
          EXPO_PUBLIC_SUPABASE_URL: https://tatroqgcyebuqqkhmvpa.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_PqzFyJK0m-HoZuBvKib4pw_VOgrSuzF
