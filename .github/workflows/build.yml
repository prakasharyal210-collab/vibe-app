name: Build Vibe APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build Android APK (preview)
        working-directory: artifacts/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SUPABASE_URL: https://tatroqgcyebuqqkhmvpa.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_PqzFyJK0m-HoZuBvKib4pw_VOgrSuzF
        run: |
          eas build --platform android \
            --profile preview \
            --non-interactive \
            --no-wait

      - name: Build Android AAB (production)
        working-directory: artifacts/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SUPABASE_URL: https://tatroqgcyebuqqkhmvpa.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_PqzFyJK0m-HoZuBvKib4pw_VOgrSuzF
        run: |
          eas build --platform android \
            --profile production \
            --non-interactive \
            --no-wait
