# Railway config for the drip-seeder worker service.
#
# Dashboard settings:
#   Root Dir:      scripts
#   Builder:       Docker (auto-detected from scripts/Dockerfile)
#   Build command: (leave blank)
#   Start command: (leave blank — CMD in Dockerfile handles it)
#
# Why Dockerfile instead of Nixpacks:
#   Nixpacks hardcodes `pnpm i --frozen-lockfile` when it sees "packageManager"
#   in package.json and ignores nixpacks.toml phase overrides. The lockfile
#   lives at repo root, unreachable from Root Dir = scripts. Docker sidesteps
#   all of this: npm install from package.json, tsx in node_modules/.bin, done.

[build]
builder = "dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
