# Railway config for the drip-seeder worker service.
#
# Dashboard settings for the drip-seeder service:
#   Source:        same GitHub repo as vibe-app
#   Root Dir:      scripts          ← MUST be "scripts"
#   Builder:       Nixpacks         ← select explicitly in Settings → Build
#   Build command: npx pnpm@10.26.1 install
#   Start command: npx tsx ./src/seed-content.ts
#
# Notes:
#   - Root Dir = "scripts" → build runs inside scripts/, pnpm-lock.yaml is at repo
#     root and unreachable, so --frozen-lockfile must NOT be used.
#   - pnpm --filter requires workspace root context; since cwd is scripts/ at
#     runtime, we invoke tsx directly instead.
#   - npx tsx works because tsx is in dependencies and installed into node_modules/.bin.

[build]
builder = "nixpacks"
buildCommand = "npx pnpm@10.26.1 install"

[deploy]
startCommand = "npx tsx ./src/seed-content.ts"
restartPolicyType = "ON_FAILURE"
