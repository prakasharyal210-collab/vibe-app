# Railway config for the drip-seeder worker service.
#
# Dashboard settings:
#   Root Dir:      scripts
#   Builder:       Nixpacks
#   Build command: (leave blank — install is handled by nixpacks.toml)
#   Start command: npx tsx ./src/seed-content.ts
#
# Why nixpacks.toml: Nixpacks auto-detects "packageManager": "pnpm" and
# hardcodes `pnpm i --frozen-lockfile` in the generated Dockerfile, ignoring
# buildCommand. The [phases.install] override in nixpacks.toml replaces that
# with --no-frozen-lockfile (needed because pnpm-lock.yaml is at repo root,
# not inside scripts/).

[build]
builder = "nixpacks"

[deploy]
startCommand = "npx tsx ./src/seed-content.ts"
restartPolicyType = "ON_FAILURE"
