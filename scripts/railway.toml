# Railway config for the drip-seeder worker service.
#
# Dashboard settings for the drip-seeder service:
#   Source:        same GitHub repo as vibe-app
#   Root Dir:      scripts          ← MUST be "scripts" (not "artifacts/api-server")
#   Builder:       Nixpacks         ← select explicitly in Settings → Build
#   Build command: npm install -g pnpm && pnpm install --frozen-lockfile
#   Start command: pnpm --filter @workspace/scripts run seed-content
#
# Dashboard settings for the vibe-app service (no change needed if already working):
#   Root Dir:  /  (repo root)  — finds root Dockerfile, uses Docker builder

[build]
builder = "nixpacks"
buildCommand = "npm install -g pnpm && pnpm install --frozen-lockfile"

[deploy]
startCommand = "pnpm --filter @workspace/scripts run seed-content"
restartPolicyType = "ON_FAILURE"
