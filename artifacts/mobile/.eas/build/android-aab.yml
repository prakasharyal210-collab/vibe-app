build:
  name: Android AAB build
  steps:
    - eas/checkout
    - run:
        name: Install dependencies
        command: pnpm install --no-frozen-lockfile
    - eas/prebuild
    - eas/configure_eas_update
    - eas/inject_android_credentials
    - eas/run_gradlew
    - eas/find_and_upload_build_artifacts
